<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HyperFrames Demo — Animated Reel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        darker: '#0a0a0f',
        hyper: { red: '#FF003C', cyan: '#00D4FF', purple: '#8B00FF', green: '#00FF88' }
      }
    }
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e5e7eb; font-family: system-ui, sans-serif; overflow: hidden; }
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
.content { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px); border-radius: 20px; padding: 40px; }
.particle { position: absolute; border-radius: 50%; pointer-events: none; }
</style>
</head><body>
<canvas id="bg"></canvas>
<div class="content">
  <div class="glass text-center max-w-2xl mx-4">
    <div class="mb-6">
      <span id="badge" class="inline-block text-xs px-3 py-1 rounded-full bg-hyper-purple/20 text-purple-300 border border-hyper-purple/30 mb-4 opacity-0">HYPERFRAMES DEMO</span>
      <h1 id="title" class="text-6xl md:text-8xl font-black bg-gradient-to-r from-red-500 via-purple-500 to-blue-500 bg-clip-text text-transparent mb-4 opacity-0">ANIMATE</h1>
      <p id="sub" class="text-xl md:text-2xl text-gray-400 font-light opacity-0">HTML + Tailwind + GSAP &rarr; Deterministic MP4</p>
    </div>
    <div id="cards" class="grid grid-cols-3 gap-4 mt-8 opacity-0">
      <div class="p-4 rounded-xl bg-white/5 border border-white/10">
        <div class="text-3xl mb-2">&#9889;</div>
        <div class="text-sm text-gray-400">Zero timeline</div>
      </div>
      <div class="p-4 rounded-xl bg-white/5 border border-white/10">
        <div class="text-3xl mb-2">&#128752;</div>
        <div class="text-sm text-gray-400">Byte-identical</div>
      </div>
      <div class="p-4 rounded-xl bg-white/5 border border-white/10">
        <div class="text-3xl mb-2">&#127916;</div>
        <div class="text-sm text-gray-400">Premiere-ready</div>
      </div>
    </div>
    <p id="footer" class="text-gray-600 text-sm mt-8 opacity-0">Open the console. Every frame is deterministic.</p>
  </div>
</div>

<script>
// === BACKGROUND CANVAS ===
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let particles = [];
let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * w,
    y: Math.random() * h,
    r: Math.random() * 2 + 1,
    dx: (Math.random() - 0.5) * 0.6,
    dy: (Math.random() - 0.5) * 0.6,
    o: Math.random() * 0.5 + 0.1
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, w, h);
  for (const p of particles) {
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0 || p.x > w) p.dx *= -1;
    if (p.y < 0 || p.y > h) p.dy *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(139, 0, 255, ${p.o})`;
    ctx.fill();
  }
  // draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(139, 0, 255, ${0.08 * (1 - dist / 150)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// === GSAP TIMELINE ===
const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

tl.to('#badge', { opacity: 1, y: 0, duration: 0.6 })
  .to('#title', { opacity: 1, y: 0, duration: 0.8 }, '-=0.3')
  .to('#sub', { opacity: 1, y: 0, duration: 0.6 }, '-=0.4')
  .to('#cards', { opacity: 1, y: 0, duration: 0.6 }, '-=0.3')
  .to('#footer', { opacity: 1, y: 0, duration: 0.5 }, '-=0.2');

// floating animation on cards
gsap.to('.grid > div', {
  y: -6,
  duration: 2,
  ease: 'sine.inOut',
  yoyo: true,
  repeat: -1,
  stagger: 0.15
});

// badge pulse
gsap.to('#badge', {
  scale: 1.05,
  duration: 1.5,
  ease: 'sine.inOut',
  yoyo: true,
  repeat: -1
});

console.log('HyperFrames Demo — deterministic, frame-perfect video from HTML');
</script>
</body></html>
